<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Local vs Remote — Nextwork</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1016; --bg2:#11141d;
  --panel:#161a25; --panel2:#1b2030;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.16);
  --txt:#e7eaf2; --muted:#8a93a8; --faint:#5b6477;
  --main:#a78bfa; --feat:#34d399; --merge:#fbbf24; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(900px 500px at 20% -10%, rgba(167,139,250,.09), transparent 55%),
    radial-gradient(700px 400px at 85% -8%,  rgba(52,211,153,.08), transparent 55%),
    var(--bg);
  color:var(--txt); font-family:'Inter',system-ui,sans-serif;
  min-height:100vh; display:flex; flex-direction:column; align-items:center;
  padding:72px 20px 48px; gap:20px;
}

/* nav */
.page-switch{
  position:fixed; top:14px; left:50%; transform:translateX(-50%);
  z-index:100; display:flex; gap:4px;
  background:rgba(22,26,37,.85); backdrop-filter:blur(10px);
  border:1px solid var(--line2); border-radius:999px; padding:4px;
}
.page-switch a{
  text-decoration:none; color:var(--muted); font-size:.8rem; font-weight:500;
  padding:6px 15px; border-radius:999px; transition:all .15s;
}
.page-switch a:hover{background:rgba(255,255,255,.06); color:var(--txt)}
.page-switch a.active{background:rgba(167,139,250,.16); color:var(--main)}

/* title */
.title{text-align:center}
.title h1{font-size:1.28rem;font-weight:700;letter-spacing:-.01em}
.title p{font-size:.86rem;color:var(--muted);margin-top:4px}

/* ── STAGE ── */
.stage{
  width:100%; max-width:1100px; min-height:220px;
  background:rgba(255,255,255,.012); border:1px solid var(--line);
  border-radius:var(--r);
  display:flex; align-items:stretch; overflow:hidden;
}

/* ── LOCAL / REMOTE SIDES ── */
.local-side{
  flex:1; display:flex; flex-direction:column; min-width:0;
  border-right:1px solid var(--line);
}
.remote-side{
  flex:1; display:flex; flex-direction:column; min-width:0;
  opacity:.3; transition:opacity .7s;
}
.remote-side.connected{ opacity:1; }

.side-header{
  padding:8px 14px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:7px;
  background:rgba(0,0,0,.18); flex-shrink:0;
}
.side-header svg.icon{ width:13px;height:13px;flex-shrink:0; }
.side-label{
  font-size:.63rem; font-weight:700; text-transform:uppercase;
  letter-spacing:.07em; flex-shrink:0;
}
.side-sub{
  font-size:.63rem; color:var(--faint);
  font-family:'JetBrains Mono',monospace;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.local-header .side-label{ color:var(--main); }
.remote-header .side-label{ color:var(--muted); }

.side-body{ flex:1; display:flex; align-items:stretch; }

/* ── FILE EXPLORER ── */
.explorer{
  flex:0 0 162px; border-right:1px solid var(--line);
  background:rgba(0,0,0,.18); display:flex; flex-direction:column;
}
.exp-header{
  padding:9px 14px; border-bottom:1px solid var(--line);
  font-size:.62rem; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--faint);
}
.exp-body{ padding:10px 0; flex:1; }
.exp-folder{
  display:flex; align-items:center; gap:6px;
  padding:4px 14px; font-family:'JetBrains Mono',monospace;
  font-size:.68rem; font-weight:600; color:var(--txt);
}
.exp-folder svg{ width:13px;height:13px;flex-shrink:0;color:#fbbf24 }
.exp-file{
  display:flex; align-items:center; gap:6px;
  padding:4px 14px 4px 28px; font-family:'JetBrains Mono',monospace;
  font-size:.67rem; color:var(--muted);
  opacity:0; transform:translateX(-6px);
  transition:opacity .4s ease, transform .4s ease;
}
.exp-file.show{ opacity:1; transform:none; }
.exp-file svg{ width:11px;height:11px;flex-shrink:0; }
.exp-file.git-folder{ color:var(--faint); font-style:italic; }
.exp-file.git-folder svg{ color:var(--faint); }
.exp-file.tracked{ color:var(--txt); }
.exp-file.tracked svg{ color:#7dd3fc; }
.exp-file.incoming{ color:var(--feat); }
.exp-file.incoming svg{ color:var(--feat); }

/* ── GRAPH PANELS ── */
.graph-panel{ flex:1; padding:18px 14px 12px; min-width:0; }
#local-svg{ width:100%; overflow:visible; display:block; height:130px; }

.remote-graph{
  flex:1; position:relative; padding:18px 14px 12px; min-width:0;
  display:flex; flex-direction:column;
}
#remote-svg{ width:100%; overflow:visible; display:block; height:130px; }
.remote-empty{
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.73rem; color:var(--faint);
  transition:opacity .5s; pointer-events:none;
}

/* ── BRIDGE ── */
.bridge{
  flex:0 0 92px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:24px; position:relative;
  background:rgba(0,0,0,.14);
  border-left:1px solid var(--line);
  border-right:1px solid var(--line);
  overflow:hidden;
}
.bridge-lbl{
  display:flex; align-items:center; gap:5px;
  font-size:.61rem; font-weight:600; letter-spacing:.03em;
  color:var(--faint); transition:color .4s;
  z-index:1; pointer-events:none;
}
.bridge-lbl svg{ width:11px;height:11px; }
.bridge-lbl.lit{ color:var(--main); }
.bridge-lbl.lit-pull{ color:var(--feat); }

/* animated commit packets */
.packet{
  position:absolute;
  width:8px; height:8px; border-radius:50%;
  top:50%; margin-top:-4px;
  pointer-events:none;
}

/* ── TERMINAL ── */
.terminal{
  width:100%; max-width:620px; background:#0a0c12;
  border:1px solid var(--line2); border-radius:12px; overflow:hidden;
}
.term-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--line);
}
.term-bar i{width:10px;height:10px;border-radius:50%;display:inline-block}
.term-bar i:nth-child(1){background:#ff5f56}
.term-bar i:nth-child(2){background:#ffbd2e}
.term-bar i:nth-child(3){background:#27c93f}
.term-bar .term-path{
  margin-left:8px;font-size:.62rem;color:var(--faint);font-family:'JetBrains Mono',monospace;
}
.term-bar .branch-indicator{ color:var(--main); }
.term-body{
  padding:12px 14px;min-height:40px;
  font-family:'JetBrains Mono',monospace;font-size:.82rem;
  display:flex;align-items:center;
}
.term-body .prompt{color:var(--feat);margin-right:8px;flex-shrink:0}
.term-body .cmd{color:var(--txt)}
.term-body .cursor{
  display:inline-block;width:8px;height:1.05em;
  vertical-align:-2px;background:var(--txt);margin-left:2px;
  animation:blink 1s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

/* ── READOUT ── */
.readout{width:100%;max-width:1100px;display:flex;flex-direction:column;gap:10px;align-items:center}
.caption{
  text-align:center;font-size:1rem;font-weight:500;color:var(--txt);
  min-height:1.5em;max-width:740px; line-height:1.6;
}
.caption b{font-weight:700}
.caption b.p{color:var(--main)}
.caption b.g{color:var(--feat)}
.caption b.y{color:var(--merge)}
.caption code{
  font-family:'JetBrains Mono',monospace; font-size:.82em;
  background:rgba(255,255,255,.07); padding:1px 6px; border-radius:4px;
  color:var(--txt);
}

.replay{
  display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;
  background:rgba(255,255,255,.04);border:1px solid var(--line2);color:var(--txt);
  font:inherit;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;
  opacity:0;pointer-events:none;
}
.replay.show{opacity:1;pointer-events:auto}
.replay:hover{border-color:var(--main);background:rgba(167,139,250,.1)}
.replay svg{width:15px;height:15px}
</style>
</head>

<script>
const SPEED = 1;
const ms    = n => n / SPEED;
const sleep = n => new Promise(r => setTimeout(r, ms(n)));
const $     = id => document.getElementById(id);

// ── Terminal ──────────────────────────────────────────────────────────────────
let typeToken = 0;
async function type(text){
  const tok = ++typeToken;
  $('cmd').textContent = '';
  for(const ch of text){
    if(tok !== typeToken) return;
    $('cmd').textContent += ch;
    await sleep(38);
  }
}
function clearTerm(){ typeToken++; $('cmd').textContent = ''; }
function say(html){ $('caption').innerHTML = html; }

// ── SVG node pop ──────────────────────────────────────────────────────────────
function popNode(id, targetR=9){
  return new Promise(resolve => {
    const el = $(id);
    const dur = ms(380);
    const t0  = performance.now();
    function tick(now){
      const raw = Math.max(0, Math.min((now - t0) / dur, 1));
      const r   = raw < 0.55
        ? (raw / 0.55) * (targetR + 4)
        : (targetR + 4) - ((raw - 0.55) / 0.45) * 4;
      el.setAttribute('r', r);
      if(raw < 1) requestAnimationFrame(tick);
      else { el.setAttribute('r', String(targetR)); resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

// ── SVG path draw ─────────────────────────────────────────────────────────────
function drawPath(id, d, dur=500){
  const el = $(id);
  el.setAttribute('d', d);
  const len = el.getTotalLength ? el.getTotalLength() : 300;
  el.style.strokeDasharray  = len;
  el.style.strokeDashoffset = len;
  el.style.transition = 'none';
  void el.offsetWidth;
  el.style.transition = `stroke-dashoffset ${ms(dur)}ms ease`;
  el.style.strokeDashoffset = '0';
  return sleep(dur);
}

// ── Fade SVG element ──────────────────────────────────────────────────────────
function fadeEl(id, on=true){
  const el = $(id);
  el.style.transition = 'opacity .45s';
  el.style.opacity = on ? '1' : '0';
}

// ── Move HEAD indicator ───────────────────────────────────────────────────────
function moveHead(cx, cy){
  return new Promise(resolve => {
    const hl = $('lhead-line');
    const ht = $('lhead-text');
    const x0 = parseFloat(hl.getAttribute('x1') || cx);
    const dur = ms(350);
    const t0  = performance.now();
    function tick(now){
      const raw = Math.min((now - t0) / dur, 1);
      const t   = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
      const x   = x0 + (cx - x0) * t;
      hl.setAttribute('x1', x); hl.setAttribute('x2', x);
      hl.setAttribute('y1', cy - 14); hl.setAttribute('y2', cy - 8);
      ht.setAttribute('x', x); ht.setAttribute('y', cy - 18);
      if(raw < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

// ── Move origin/main pill ─────────────────────────────────────────────────────
function moveOriginPill(targetCx){
  return new Promise(resolve => {
    const rect = $('lorigin-rect');
    const text = $('lorigin-text');
    const rectW = 78;
    const x0 = parseFloat(rect.getAttribute('x'));
    const xTarget = targetCx - rectW / 2;
    const dur = ms(420);
    const t0  = performance.now();
    function tick(now){
      const raw = Math.min((now - t0) / dur, 1);
      const t   = raw < 0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
      const x   = x0 + (xTarget - x0) * t;
      rect.setAttribute('x', x);
      text.setAttribute('x', x + rectW / 2);
      if(raw < 1) requestAnimationFrame(tick);
      else resolve();
    }
    requestAnimationFrame(tick);
  });
}

// ── Packet animation across bridge ───────────────────────────────────────────
async function sendPackets(dir, count, color){
  const bridge = $('bridge');
  const stagger = 155;
  for(let i = 0; i < count; i++){
    if(i > 0) await sleep(stagger);
    const dot = document.createElement('div');
    dot.className = 'packet';
    dot.style.cssText = `background:${color};box-shadow:0 0 7px ${color};`;
    dot.style.left = dir === 'push' ? '4px' : 'calc(100% - 12px)';
    bridge.appendChild(dot);
    void dot.offsetWidth;
    dot.style.transition = 'left 640ms ease-in-out';
    dot.style.left = dir === 'push' ? 'calc(100% - 12px)' : '4px';
    setTimeout(() => {
      dot.style.transition += ', opacity 200ms';
      dot.style.opacity = '0';
      setTimeout(() => dot.remove(), 240);
    }, 680);
  }
  await sleep(stagger * (count - 1) + 700);
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function reset(){
  // local graph: restore ll-main, clear ll-ext
  const llMain = $('ll-main');
  llMain.setAttribute('d', 'M 10 65 L 230 65');
  llMain.style.strokeDasharray = 'none';
  llMain.style.strokeDashoffset = '0';
  llMain.style.transition = 'none';

  const llExt = $('ll-ext');
  llExt.setAttribute('d', '');
  llExt.style.strokeDashoffset = '1000';
  llExt.style.transition = 'none';

  // remote paths
  ['rl-main','rl-ext'].forEach(id => {
    const e = $(id);
    e.setAttribute('d', '');
    e.style.strokeDashoffset = '1000';
    e.style.transition = 'none';
  });

  // local c3 hidden, local c0-c2 stay visible
  $('lc3').setAttribute('r', '0');
  ['llbl-c3'].forEach(id => $(id).style.opacity = '0');

  // remote nodes hidden
  ['rc0','rc1','rc2','rc3'].forEach(id => $(id).setAttribute('r', '0'));
  ['rlbl-c0','rlbl-c1','rlbl-c2','rlbl-c3'].forEach(id => $(id).style.opacity = '0');

  // reset HEAD to c2
  $('lhead-line').setAttribute('x1', '230'); $('lhead-line').setAttribute('x2', '230');
  $('lhead-line').setAttribute('y1', '51');  $('lhead-line').setAttribute('y2', '57');
  $('lhead-text').setAttribute('x', '230');  $('lhead-text').setAttribute('y', '47');

  // reset origin pill
  $('lorigin-rect').setAttribute('x', '191');
  $('lorigin-text').setAttribute('x', '230');
  $('lorigin-pill').style.transition = 'none';
  $('lorigin-pill').style.opacity = '0';

  // remote side
  $('remote-side').classList.remove('connected');
  $('remote-url').textContent = 'not connected';
  $('remote-empty').style.opacity = '1';
  ['rpill-main','rpill-teammate'].forEach(id => {
    $(id).style.transition = 'none'; $(id).style.opacity = '0';
  });

  // bridge
  $('lbl-push').classList.remove('lit');
  $('lbl-pull').classList.remove('lit-pull');

  // file explorer
  const ef = $('ef-navbar');
  ef.style.opacity = '0'; ef.style.transform = 'translateX(-6px)';

  $('replay').classList.remove('show');
  $('cursor').style.display = '';
}

// ── MAIN SEQUENCE ─────────────────────────────────────────────────────────────
async function run(){
  reset();
  clearTerm(); say('');
  await sleep(500);

  // ── 1. Show local state ───────────────────────────────────────────────────
  say('You\'ve been building locally. Three commits on <b class="p">main</b> — your machine has the full history, but GitHub doesn\'t know you exist yet.');
  await sleep(3400);

  // ── 2. git remote add ─────────────────────────────────────────────────────
  clearTerm();
  say('<code>git remote add origin</code> registers a destination for your code. Nothing is sent yet — git just stores the address.');
  await type('git remote add origin https://github.com/you/my-project.git');
  await sleep(700);
  $('remote-url').textContent = 'github.com / you / my-project';
  $('remote-side').classList.add('connected');
  await sleep(2600);

  // ── 3. git push ───────────────────────────────────────────────────────────
  clearTerm();
  say('<code>git push -u origin main</code> uploads your commits to GitHub. The <code>-u</code> links <b class="p">main</b> to <b class="p">origin/main</b> — future pushes just need <code>git push</code>.');
  await type('git push -u origin main');
  await sleep(500);
  $('lbl-push').classList.add('lit');

  // packets fly; remote graph draws simultaneously
  const pushPackets = sendPackets('push', 3, '#a78bfa');
  const remoteDrawing = (async () => {
    await drawPath('rl-main', 'M 10 65 L 275 65', 950);
    popNode('rc0'); fadeEl('rlbl-c0');
    await sleep(200); popNode('rc1'); fadeEl('rlbl-c1');
    await sleep(200); popNode('rc2'); fadeEl('rlbl-c2');
  })();
  await Promise.all([pushPackets, remoteDrawing]);

  $('remote-empty').style.transition = 'opacity .4s';
  $('remote-empty').style.opacity = '0';
  $('rpill-main').style.transition = 'opacity .5s';
  $('rpill-main').style.opacity = '1';
  $('lorigin-pill').style.transition = 'opacity .5s';
  $('lorigin-pill').style.opacity = '1';
  $('lbl-push').classList.remove('lit');
  await sleep(3000);

  // ── 4. Teammate pushes to remote ─────────────────────────────────────────
  clearTerm();
  say('A teammate pushed a new commit from their machine. The remote has moved on — your local repo doesn\'t know about it yet.');
  await sleep(1400);
  await drawPath('rl-ext', 'M 275 65 L 380 65', 450);
  await popNode('rc3');
  fadeEl('rlbl-c3');
  $('rpill-teammate').style.transition = 'opacity .5s';
  $('rpill-teammate').style.opacity = '1';
  await sleep(2800);

  // ── 5. git pull ───────────────────────────────────────────────────────────
  clearTerm();
  say('<code>git pull</code> fetches the new commit <b>and</b> merges it into your branch in one step. Now your local repo and GitHub are perfectly in sync.');
  await type('git pull');
  await sleep(600);
  $('lbl-pull').classList.add('lit-pull');

  const pullPackets = sendPackets('pull', 1, '#34d399');
  await sleep(380);
  await drawPath('ll-ext', 'M 230 65 L 310 65', 450);
  await popNode('lc3');
  fadeEl('llbl-c3');
  // show navbar.js in explorer
  void $('ef-navbar').offsetWidth;
  $('ef-navbar').style.transition = 'opacity .4s ease, transform .4s ease';
  $('ef-navbar').style.opacity = '1';
  $('ef-navbar').style.transform = 'none';
  await moveHead(310, 65);
  await pullPackets;
  await moveOriginPill(310);
  $('lbl-pull').classList.remove('lit-pull');
  $('rpill-teammate').style.opacity = '0';
  await sleep(2800);

  // ── 6. Done ───────────────────────────────────────────────────────────────
  clearTerm();
  say('<b class="p">Push</b> to share your work. <b class="g">Pull</b> to receive others\'. The remote is just a shared copy everyone syncs to — every <code>.git/</code> folder holds the real history.');
  $('cursor').style.display = 'none';
  await sleep(600);
  $('replay').classList.add('show');
}

$('replay').addEventListener('click', run);
window.addEventListener('load', run);
</script>
